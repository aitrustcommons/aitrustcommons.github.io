site_name: AI Trust Commons
site_url: https://aitrustcommons.org
site_description: Open-source governance for AI agents that works across providers
site_author: Nikhil Singhal

repo_url: https://github.com/aitrustcommons/governance-framework
repo_name: aitrustcommons/governance-framework

theme:
  name: material
  custom_dir: overrides
  palette:
    - scheme: slate
      primary: blue
      accent: blue
      toggle:
        icon: material/brightness-7
        name: Switch to light mode
    - scheme: default
      primary: blue
      accent: blue
      toggle:
        icon: material/brightness-4
        name: Switch to dark mode
  font:
    text: DM Sans
    code: JetBrains Mono
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.tabs.link
    - toc.integrate
  icon:
    repo: fontawesome/brands/github

plugins:
  - search
  - blog:
      blog_dir: blog
      post_date_format: long
      categories_allowed:
        - From Instinct to Intent Series
        - AI Governance
        - Standards

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html
  - toc:
      permalink: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/aitrustcommons
    - icon: fontawesome/brands/linkedin
      link: https://linkedin.com/in/nikhilsinghal
    - icon: fontawesome/solid/envelope
      link: mailto:nikhil@aitrustcommons.org

copyright: "&copy; 2026 AI Trust Commons. Apache 2.0 License."

extra_css:
  - stylesheets/extra.css

nav:
  - Home: index.md
  - Framework: framework.md
  - Standards: standards.md
  - About: about.md
  - Blog:
    - blog/index.md
